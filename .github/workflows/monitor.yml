# 大学採用ページ監視ジョブ（24時間に1回）
# 必要な secrets: SITE_URL, MONITOR_RUN_TOKEN（方法A）など
name: Monitor

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 0:00 UTC = 日本時間 9:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # 方法A: API で実行（Vercel 等にデプロイしている場合）
      - name: Trigger monitor API
        run: |
          curl -s -X POST "${{ secrets.SITE_URL }}/api/monitor/run" \
            -H "Authorization: Bearer ${{ secrets.MONITOR_RUN_TOKEN }}" \
            -H "Content-Type: application/json"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}

      # 方法B: スクリプトで実行（DB に直接接続する場合。方法A とどちらか一方を使用）
